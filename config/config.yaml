project:
  name: Enterprise Fraud Detection Platform
  version: 2.0

paths:
  raw_data: data/raw
  processed_data: data/processed
  reports: reports
  artifacts: artifacts
  models: models
  logs: logs

training:
  random_state: 42
  validation_size: 0.2
  split_strategy: stratified      # stratified | chronological
  shuffle: true
  target_column: isFraud
  transaction_time_column: TransactionDT

models:
  random_forest:
    enabled: true
    n_estimators: 300
    max_depth: 20
    n_jobs: -1
  xgboost:
    enabled: true
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 8
    subsample: 0.8
    colsample_bytree: 0.8
    tree_method: hist
    random_state: 42
  lightgbm:
    enabled: true
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 64
    random_state: 42
  catboost:
    enabled: true
    iterations: 300
    learning_rate: 0.05
    depth: 8
    verbose: false


xgboost:
  objective: binary:logistic
  eval_metric: aucpr
  learning_rate: 0.05
  max_depth: 8
  subsample: 0.8
  colsample_bytree: 0.8
  n_estimators: 5000

lightgbm:
  learning_rate: 0.05
  n_estimators: 5000

catboost:
  iterations: 5000
  learning_rate: 0.05
  depth: 8

mlflow:
  experiment_name: fraud_detection
  tracking_uri: sqlite:///mlflow.db

monitoring:
  drift_threshold: 0.2

artifacts:
  root_dir: artifacts
  keep_last: 20
  save_config: true
  save_environment: true
  save_git_commit: true
  save_metadata: true